<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: header}"></head>

<body>
    <nav th:replace="~{layout :: nav}"></nav>

    <div class="container">
        <h1 th:text="${employe.id == null ? 'Ajouter un Employé' : 'Modifier l''Employé'}">Titre</h1>

        <div class="card" style="max-width: 600px; margin-top: 2rem;">
            <form th:action="@{/rh/employes/enregistrer}" th:object="${employe}" method="post">
                <input type="hidden" th:field="*{id}">

                <div th:if="${#fields.hasErrors('*')}" class="card"
                    style="background: #fee2e2; color: #991b1b; padding: 0.75rem; margin-bottom: 1rem; border: none;">
                    <ul>
                        <li th:each="err : ${#fields.allErrors()}" th:text="${err}">Erreur</li>
                    </ul>
                </div>

                <div class="form-group">
                    <label>Nom Complet</label>
                    <input type="text" th:field="*{nomComplet}" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" th:field="*{email}" required>
                    </div>
                    <div class="form-group">
                        <label>Téléphone</label>
                        <input type="text" th:field="*{telephone}">
                    </div>
                </div>

                <div class="form-group">
                    <label>Poste</label>
                    <input type="text" th:field="*{poste}">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Salaire (FCFA)</label>
                        <input type="number" step="0.01" th:field="*{salaire}">
                    </div>
                    <div class="form-group">
                        <label>Date d'Embauche</label>
                        <input type="date" th:field="*{dateEmbauche}">
                    </div>
                </div>

                <div class="form-group">
                    <label>Département</label>
                    <select th:field="*{departement.id}">
                        <option value="">Sélectionner un département</option>
                        <option th:each="dept : ${departements}" th:value="${dept.id}" th:text="${dept.nom}">IT</option>
                    </select>
                </div>

                <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                    <a th:href="@{/rh/employes}" class="btn" style="background: #e2e8f0; color: #1e293b;">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
